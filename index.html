<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何語菲 YU-FEI HE | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f5f1ea; --text-color: #3e3e3e; --accent-color: #cb9b66; --card-bg: #ffffff; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; line-height: 1.8; font-weight: 300; }
        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        header { display: grid; grid-template-columns: 280px 1fr; gap: 50px; margin-bottom: 60px; align-items: start; }
        .profile-side { text-align: center; }
        .profile-pic { width: 100%; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .name-ch { font-size: 1.8rem; margin: 20px 0 5px 0; letter-spacing: 5px; font-weight: 400; }
        .name-en { font-size: 0.9rem; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .section-title { border-left: 2px solid var(--accent-color); padding-left: 15px; margin: 40px 0 20px 0; font-weight: 400; font-size: 1.2rem; }
        
        /* 檔案下載區塊 */
        .download-box { background: #fff; padding: 20px; border-radius: 4px; border: 1px solid #ddd; margin-top: 20px; }
        .download-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .download-item:last-child { border-bottom: none; }
        .btn-download { color: var(--accent-color); text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid var(--accent-color); padding: 5px 15px; border-radius: 20px; transition: 0.3s; }
        .btn-download:hover { background: var(--accent-color); color: #fff; }

        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .work-card { background: var(--card-bg); border-radius: 4px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.3s; }
        .work-card:hover { transform: translateY(-5px); }
        .work-media { width: 100%; height: 220px; background: #000; overflow: hidden; position: relative; }
        .work-media iframe { width: 100%; height: 100%; border: none; }
        .work-info { padding: 15px; border-top: 1px solid #f0f0f0; }
        @media (max-width: 850px) { header { grid-template-columns: 1fr; text-align: center; } .profile-side { width: 240px; margin: 0 auto 30px; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="profile-side">
            <img src="./profile.jpg" class="profile-pic" alt="何語菲" onerror="this.src='https://via.placeholder.com/280x350?text=Profile+Image'">
            <h1 class="name-ch">何 語 菲</h1>
            <p class="name-en">YU-FEI HE</p>
            <p style="font-size: 0.85rem; color: #666;">a0973577610@gmail.com</p>
        </div>
        
        <div class="intro-text">
            <h3 class="section-title" style="margin-top:0;">ABOUT ME</h3>
            <p>我畢業於設計相關科系，對平面設計與品牌行銷有高度興趣。曾在傳統製造業負責社群媒體與電商平台管理，擅長平面設計、影片剪輯與動畫製作。我能運用 AI 工具提升行銷效率，並具備社群廣告投放與數據分析的實務經驗。重視團隊協作，致力於將創意轉化為具體的品牌影響力。</p>
            
            <h3 class="section-title">DOCUMENTS | 雲端檔案下載</h3>
            <div class="download-box">
                <div class="download-item">
                    <span>202510 完整作品集 PDF</span>
                    <a href="https://drive.google.com/drive/folders/1pzW2igj78yuzdL0BYdBjWInQn_RCn0H9" target="_blank" class="btn-download">查看檔案</a>
                </div>
                <div class="download-item">
                    <span>活動企劃書 - 孩子無限創造力</span>
                    <a href="https://drive.google.com/drive/folders/1pzW2igj78yuzdL0BYdBjWInQn_RCn0H9" target="_blank" class="btn-download">查看檔案</a>
                </div>
                <div class="download-item">
                    <span>志工服務證明書</span>
                    <a href="https://drive.google.com/drive/folders/1pzW2igj78yuzdL0BYdBjWInQn_RCn0H9" target="_blank" class="btn-download">查看檔案</a>
                </div>
            </div>
        </div>
    </header>

    <h2 class="section-title">VIDEO & ANIMATION | 影音作品展示</h2>
    <div class="portfolio-grid" id="main-gallery"></div>
</div>

<script>
    const gallery = document.getElementById('main-gallery');
    
    // 根據 YouTube 頻道與截圖更新的影片列表
    const youtubeVideos = [
        { id: 'S4052U0eM9g', tag: 'Animation 1' },
        { id: 'X5E78iY7Z2M', tag: 'Animation 2' },
        { id: 'O3o8_WwW7G8', tag: 'Video 5' },
        { id: 'S_iS6W8A2pI', tag: 'Video 4' },
        { id: 'I_eQ8D9z0L4', tag: 'Video 3' },
        { id: 'Y_pE7D6z1L2', tag: 'Video 2' },
        { id: 'T_rE9D5z2L3', tag: 'Video 1' }
    ];

    youtubeVideos.forEach(vid => {
        gallery.innerHTML += `
            <div class="work-card">
                <div class="work-media">
                    <iframe src="https://www.youtube.com/embed/${vid.id}" allowfullscreen></iframe>
                </div>
                <div class="work-info">
                    <span style="color:var(--accent-color); font-size:0.75rem; font-weight:700;">${vid.tag}</span>
                </div>
            </div>
        `;
    });
</script>
</body>
</html>
