<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何語菲 YU-FEI HE Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f1ea; --text-color: #3e3e3e; --accent-color: #cb9b66; --card-bg: #ffffff;
        }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; font-weight: 300; }
        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        
        /* 簡介區 */
        header { display: grid; grid-template-columns: 260px 1fr; gap: 50px; margin-bottom: 60px; }
        .profile-side { text-align: center; }
        .profile-pic { width: 100%; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: #eee; }
        .btn-cv { display: inline-block; margin-top: 20px; padding: 8px 20px; border: 1px solid var(--accent-color); color: var(--accent-color); text-decoration: none; font-size: 0.8rem; }
        .btn-cv:hover { background: var(--accent-color); color: white; }

        .section-title { border-left: 2px solid var(--accent-color); padding-left: 15px; margin: 40px 0 20px 0; font-weight: 400; }

        /* 作品網格 */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .work-card { background: var(--card-bg); border-radius: 4px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .work-media { width: 100%; height: 220px; background: #000; }
        .work-media video, .work-media img { width: 100%; height: 100%; object-fit: cover; }
        .work-info { padding: 15px; }
        .work-tag { color: var(--accent-color); font-size: 0.7rem; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="profile-side">
            <div class="profile-pic" style="height: 300px; display: flex; align-items: center; justify-content: center; background: #e0e0e0; color: #999;">
                Profile Image
            </div>
            <h1 style="font-size: 1.6rem; margin: 15px 0 5px 0;">何 語 菲</h1>
            <a href="profile.202510.pdf" target="_blank" class="btn-cv">VIEW RESUME PDF</a>
        </div>
        <div class="intro-text">
            <h3 class="section-title" style="margin-top:0;">ABOUT ME</h3>
            <p>我畢業於設計相關科系，對平面設計與品牌行銷有高度興趣... (後略)</p>
        </div>
    </header>

    <h2 class="section-title">VIDEO WORKS</h2>
    <div class="portfolio-grid" id="video-gallery"></div>

    <h2 class="section-title">ANIMATION WORKS</h2>
    <div class="portfolio-grid" id="anim-gallery"></div>
</div>

<script>
    // 處理影片：處理「空格」與「括號」
    const videoGallery = document.getElementById('video-gallery');
    for (let i = 1; i <= 5; i++) {
        const fileName = `video (${i}).mp4`; // 這裡必須與 GitHub 上的名字完全一樣
        videoGallery.innerHTML += `
            <div class="work-card">
                <div class="work-media">
                    <video controls muted loop playsinline>
                        <source src="${encodeURI(fileName)}" type="video/mp4">
                    </video>
                </div>
                <div class="work-info">
                    <span class="work-tag">VIDEO ${i}</span>
                </div>
            </div>
        `;
    }

    // 處理動畫：Animation.1.gif ~ Animation.4.gif
    const animGallery = document.getElementById('anim-gallery');
    for (let i = 1; i <= 4; i++) {
        const fileName = `Animation.${i}.gif`;
        animGallery.innerHTML += `
            <div class="work-card">
                <div class="work-media">
                    <img src="${fileName}" alt="Animation ${i}" onerror="this.parentElement.innerHTML='<div style=padding:20px;color:red;font-size:12px;>找不到檔案: ${fileName}</div>'">
                </div>
                <div class="work-info">
                    <span class="work-tag">ANIMATION ${i}</span>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
