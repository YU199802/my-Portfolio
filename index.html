<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何語菲 YU-FEI HE | 個人作品展示</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f1ea;
            --text-color: #3e3e3e;
            --accent-color: #cb9b66;
            --card-bg: #ffffff;
            --soft-shadow: rgba(0, 0, 0, 0.04);
        }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; line-height: 1.8; font-weight: 300;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }

        /* 頂部簡介 */
        header { display: grid; grid-template-columns: 260px 1fr; gap: 50px; margin-bottom: 80px; align-items: start; }
        .profile-side { text-align: center; }
        .profile-pic { width: 100%; border-radius: 4px; box-shadow: 0 10px 30px var(--soft-shadow); }
        .name-ch { font-size: 1.8rem; margin: 20px 0 5px 0; letter-spacing: 5px; font-weight: 400; }
        .name-en { font-size: 0.9rem; color: #888; letter-spacing: 2px; text-transform: uppercase; }
        
        /* 連結按鈕 */
        .btn-cv { 
            display: inline-block; margin-top: 30px; padding: 10px 25px; 
            border: 1px solid var(--accent-color); color: var(--accent-color);
            text-decoration: none; font-size: 0.85rem; border-radius: 2px;
            transition: all 0.3s;
        }
        .btn-cv:hover { background: var(--accent-color); color: white; }

        .intro-text { font-size: 0.95rem; color: #555; text-align: justify; }
        .section-title { 
            border-left: 2px solid var(--accent-color); padding-left: 15px;
            margin: 40px 0 20px 0; font-size: 1.1rem; font-weight: 400; 
        }

        /* 作品集網格 */
        .portfolio-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; margin-top: 40px; 
        }
        .work-card { 
            background: var(--card-bg); border-radius: 4px; overflow: hidden;
            box-shadow: 0 4px 20px var(--soft-shadow); transition: 0.3s;
        }
        .work-card:hover { transform: translateY(-8px); }
        .work-media { width: 100%; height: 220px; background: #eee; overflow: hidden; display: block; }
        .work-media video, .work-media img { width: 100%; height: 100%; object-fit: cover; }
        .work-info { padding: 20px; }
        .work-tag { color: var(--accent-color); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .work-title { font-size: 1rem; margin: 5px 0; font-weight: 400; }

        @media (max-width: 768px) {
            header { grid-template-columns: 1fr; text-align: center; }
            .profile-side { margin: 0 auto; width: 200px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="profile-side">
            <img src="profile.jpg" class="profile-pic" alt="何語菲">
            <h1 class="name-ch">何 語 菲</h1>
            <p class="name-en">YU-FEI HE</p>
            <a href="profile.202510.pdf" target="_blank" class="btn-cv">VIEW FULL RESUME</a>
        </div>
        
        <div class="intro-text">
            <h3 class="section-title">ABOUT ME</h3>
            <p>我畢業於設計相關科系，對平面設計與品牌行銷有高度興趣。能獨立完成平面設計、影片剪輯與動畫製作，將創意以多媒體方式呈現。擅長運用 AI 工具提升效率，並具備社群廣告投放與數據分析實務經驗。</p>
            
            <h3 class="section-header">SOFTWARE SKILLS</h3>
            <p>Ps / Ai / Ae / Pr / Office</p>
        </div>
    </header>

    <h2 class="section-title">PORTFOLIO WORKS</h2>
    
    <div class="portfolio-grid">
        <div class="work-card">
            <div class="work-media">
                <video autoplay muted loop playsinline>
                    <source src="video.1.mp4" type="video/mp4">
                </video>
            </div>
            <div class="work-info">
                <span class="work-tag">Motion Design</span>
                <h3 class="work-title">動畫作品展示 01</h3>
            </div>
        </div>

        <div class="work-card">
            <div class="work-media">
                <img src="Animation.1.gif" alt="Animation">
            </div>
            <div class="work-info">
                <span class="work-tag">Animation</span>
                <h3 class="work-title">動態貼圖 / 元素設計</h3>
            </div>
        </div>

        <div class="work-card">
            <div class="work-media">
                <video autoplay muted loop playsinline>
                    <source src="video.2.mp4" type="video/mp4">
                </video>
            </div>
            <div class="work-info">
                <span class="work-tag">Video Production</span>
                <h3 class="work-title">社群短影音企劃</h3>
            </div>
        </div>
        
        </div>
</div>

</body>
</html>
